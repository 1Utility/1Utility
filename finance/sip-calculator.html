<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP Calculator | 1Utility</title>
<meta name="description" content="Calculate SIP returns with compound growth. Smart investment planner with real-time results.">

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --card2:#0f172a;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --primary:#7c3aed;
  --accent:#22c55e;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
  background: radial-gradient(circle at top, #1e1b4b, #0b1220);
  color:var(--text);
  min-height:100vh;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{
  font-size:2.2rem;
  background:linear-gradient(90deg,#fff,#a78bfa,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  color:var(--muted);
  margin-top:8px;
  font-size:14px;
}

/* layout */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* inputs */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-top:20px;
}

label{
  font-size:12px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
  letter-spacing:0.5px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
  outline:none;
}

input:focus{
  border-color:var(--primary);
}

/* button */
button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(90deg,#7c3aed,#22c55e);
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

/* results */
.results{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.box{
  background:#0b1220;
  border:1px solid var(--border);
  padding:16px;
  border-radius:12px;
  text-align:center;
}

.box h3{
  font-size:12px;
  color:var(--muted);
}

.box p{
  font-size:18px;
  margin-top:6px;
  font-weight:bold;
  color:#fff;
}

.highlight{
  border-color:var(--accent);
}

footer{
  text-align:center;
  margin:40px 0;
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>SIP Calculator</h1>
  <div class="sub">Smart Wealth Growth Planner · 1Utility Finance Tools</div>
</header>

<div class="container">

  <div class="card">

    <div class="grid">
      <div>
        <label>Monthly Investment</label>
        <input type="number" id="amount" value="10000">
      </div>

      <div>
        <label>Expected Return (%)</label>
        <input type="number" id="rate" value="12">
      </div>

      <div>
        <label>Time Period (Years)</label>
        <input type="number" id="years" value="10">
      </div>
    </div>

    <button onclick="calcSIP()">Calculate Growth</button>

    <div class="results" id="results"></div>

  </div>

</div>

<footer>
  © 1Utility · SIP Calculator · Educational Use Only
</footer>

<script>
function calcSIP(){
  let P = +document.getElementById("amount").value;
  let r = (+document.getElementById("rate").value)/100/12;
  let n = (+document.getElementById("years").value)*12;

  let maturity = P * ((Math.pow(1+r,n)-1)/r) * (1+r);
  let invested = P * n;
  let gain = maturity - invested;

  document.getElementById("results").innerHTML = `
    <div class="box highlight">
      <h3>Maturity Value</h3>
      <p>₹ ${Math.round(maturity).toLocaleString()}</p>
    </div>

    <div class="box">
      <h3>Total Invested</h3>
      <p>₹ ${Math.round(invested).toLocaleString()}</p>
    </div>

    <div class="box">
      <h3>Wealth Gained</h3>
      <p>₹ ${Math.round(gain).toLocaleString()}</p>
    </div>
  `;
}
</script>

</body>
</html>
