<style>
:root{
  --bg1:#050816;
  --bg2:#0a1a2f;
  --card:rgba(255,255,255,0.06);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --accent2:#60a5fa;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:
    radial-gradient(circle at top,#0ea5e9 0%,transparent 40%),
    radial-gradient(circle at bottom,#1d4ed8 0%,transparent 45%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}

/* header */
header{
  text-align:center;
  padding:40px 20px;
}

h1{
  font-size:2.4rem;
  background:linear-gradient(90deg,#38bdf8,#60a5fa,#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* container */
.container{max-width:900px;margin:auto;padding:20px;}

.card{
  background:var(--card);
  backdrop-filter: blur(12px);
  border:1px solid var(--border);
  padding:26px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* inputs */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

label{
  font-size:12px;
  color:var(--muted);
  letter-spacing:0.5px;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.3);
  color:white;
  outline:none;
}

input:focus{
  border-color:var(--accent);
}

/* button */
button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

/* results */
.results{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.box{
  background:rgba(0,0,0,0.35);
  border:1px solid var(--border);
  padding:16px;
  border-radius:14px;
  text-align:center;
}

.box h3{font-size:12px;color:var(--muted);}
.box p{font-size:18px;margin-top:6px;}

.highlight{
  border-color:var(--accent);
}

</style>
